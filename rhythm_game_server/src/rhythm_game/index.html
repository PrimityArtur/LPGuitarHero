<!DOCTYPE html>
<html>
<body>

<button onclick="conectar()">Conectar</button>

<script>

function conectar() {

    const ws =
        new WebSocket("ws://localhost:8080/ws");

    ws.onopen = () => {

        ws.send(JSON.stringify({
            eventoCliente: "conectar",
            nombre: "Enzo"
        }));
    };

    ws.onmessage = (e) => {
        console.log(JSON.parse(e.data));
    };
}

</script>

</body>
</html>
