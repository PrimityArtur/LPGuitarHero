<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Rhythm Game Test Client</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

    <h1>🎵 Rhythm Game Test Client</h1>

    <div class="card">

        <h3>Conexión</h3>

        <input
            id="nombre"
            type="text"
            placeholder="Nombre jugador">

        <button onclick="conectar()">
            Conectar
        </button>

    </div>

    <div class="card">

        <h3>Iniciar Partida</h3>

        <input
            id="cancion"
            type="number"
            value="1"
            placeholder="ID Canción">

        <input
            id="cantidad"
            type="number"
            value="2"
            placeholder="Jugadores">

        <button onclick="iniciarPartida()">
            Iniciar Partida
        </button>

    </div>

    <div class="card">

        <h3>Simular Puntajes</h3>

        <button onclick="enviarPerfect()">
            Perfect (+100)
        </button>

        <button onclick="enviarGood()">
            Good (+50)
        </button>

        <button onclick="enviarMiss()">
            Miss (0)
        </button>

    </div>

    <div class="card">

        <h3>Jugadores</h3>

        <div id="jugadores">
            Sin jugadores
        </div>

    </div>

    <div class="card">

        <h3>Mensajes</h3>

        <div id="log"></div>

    </div>

</div>

<script src="js/main.js"></script>

</body>
</html>
